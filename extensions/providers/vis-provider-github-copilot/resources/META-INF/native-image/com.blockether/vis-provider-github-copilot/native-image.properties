# native-image build config for the vis-provider-github-copilot extension.
#
# graal-build-time's InitClojureClasses feature (enabled by the main vis
# artifact) initializes every Clojure-generated class at build time, so this
# extension needs no per-namespace --initialize-at-build-time entry. Add Args
# here only for JAVA-library reachability this extension uniquely pulls in.
#
# Regenerate reachability-metadata.json by exercising this extension under the
# native-image tracing agent:
#   java -agentlib:native-image-agent=config-merge-dir=${.} -cp ... <exercise>
