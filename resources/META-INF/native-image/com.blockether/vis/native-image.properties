# native-image build config for the vis application (com.blockether/vis).
#
# This is the CANONICAL home for vis's own native-image arguments: because it is
# bundled in the image classpath, native-image auto-applies these Args (no need
# to pass them on the command line — `clojure -T:build native` just supplies
# `-jar`/`-o`). Library jars on the classpath contribute their OWN config the
# same way: GraalPy (org.graalvm.python/python-language) already ships the heavy
# args it needs (--initialize-at-build-time=com.oracle.graal.python,…,
# --features=…BouncyCastleFeature, -H:MaxRuntimeCompileMethods, JavaArgs=-Xms14g),
# so vis MUST NOT duplicate them here.
#
# What vis adds:
#  - graal-build-time InitClojureClasses: initialize every Clojure-generated
#    class at build time (it ships no native-image.properties, so enable it here).
#  - com.blockether.vis.internal.nativeimage: a vis Feature that `require`s every
#    app + extension namespace in beforeAnalysis WITH *warn-on-reflection* bound,
#    so library namespaces with top-level (set! *warn-on-reflection* true) don't
#    crash build-time class init on GraalVM's parallel analysis workers. MUST run
#    together with graal-build-time. See that namespace's docstring.
#  - org.bouncycastle at build time: the vis Feature preloads every app
#    namespace at build time, and foundation-git -> jgit/sshd statically
#    registers a BouncyCastleProvider INTO THE IMAGE HEAP. GraalPy <=25.0
#    shipped BouncyCastleFeature which build-time-initialized org.bouncycastle
#    for us; 25.1 replaced it with a lazy PythonCryptoFeature, so vis owns the
#    flag now (heap SecureRandoms are re-seeded by RuntimeRandomnessFeature).
#  - --no-fallback: force a real image; missing reachability config surfaces at
#    runtime (GraalVM 25 always reports unsupported elements at run time).
#  - native access / FFM: rift (FFM downcalls) and the GraalPy/Truffle host need
#    --enable-native-access; the polyglot warning is silenced.
#
# The app-wide reachability config (Clojure/babashka/nREPL/sqlite/app reflection
# + resources) lives next to this file in reachability-metadata.json, generated
# by the tracing agent. Regenerate per AGENTS.md "GraalVM native-image".
Args = --features=clj_easy.graal_build_time.InitClojureClasses \
       --features=com.blockether.vis.internal.nativeimage \
       --no-fallback \
       --report-unsupported-elements-at-runtime \
       -H:+UnlockExperimentalVMOptions \
       -H:+ReportExceptionStackTraces \
       -J--enable-native-access=ALL-UNNAMED \
       -J-Dpolyglot.engine.WarnInterpreterOnly=false \
       --enable-url-protocols=https,http \
       --initialize-at-build-time=malli \
       --initialize-at-build-time=com.fasterxml.jackson \
       --initialize-at-build-time=org.commonmark \
       --initialize-at-build-time=com.googlecode.lanterna \
       --initialize-at-build-time=borkdude \
       --initialize-at-build-time=clj_kondo \
       --initialize-at-build-time=pod.borkdude \
       --initialize-at-build-time=sci \
       --initialize-at-build-time=bencode \
       --initialize-at-build-time=nrepl \
       --initialize-at-build-time=taoensso \
       --initialize-at-build-time=com.taoensso \
       --initialize-at-build-time=honey \
       --initialize-at-build-time=charred \
       --initialize-at-build-time=camel_snake_kebab \
       --initialize-at-build-time=flatland \
       --initialize-at-build-time=fipp \
       --initialize-at-build-time=edamame \
       --initialize-at-build-time=clj_yaml \
       --initialize-at-build-time=org.apache.sshd \
       --initialize-at-build-time=org.eclipse.jetty.ee9.nested.HttpOutput \
       --initialize-at-build-time=org.eclipse.jetty.util.thread.ThreadIdPool \
       --initialize-at-build-time=org.eclipse.jetty.util.ProcessorUtils \
       --initialize-at-build-time=org.eclipse.jetty.util.MathUtils \
       --initialize-at-build-time=org.bouncycastle \
       --initialize-at-build-time=org.apache.mina \
       --initialize-at-build-time=com.knuddels.jtokkit \
       --initialize-at-build-time=org.slf4j \
       --initialize-at-build-time=clojure.lang.XMLHandler
