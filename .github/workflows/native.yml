name: Native Image

# Runs on EVERY commit: every push to main and every pull-request update, plus
# manual dispatch. Deliberately NOT gated behind the CI workflow — native-image
# is the real shippable artifact, so we prove it builds on all three OSes on
# every commit rather than discovering a platform break only at release time.
# native-image of a GraalPy-embedding Clojure app is heavy (RAM + minutes);
# fail-fast false so one OS failing still reports the rest.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: native-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build the standalone `vis` native binary on each OS, smoke-test it, and
  # upload it as an artifact. native-image of a GraalPy-embedding Clojure app is
  # heavy (RAM + minutes); fail-fast false so one OS failing still reports the rest.
  native:
    name: native / ${{ matrix.os }}
    # (no CI gate — we build native on every commit, all platforms.)
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bin: target/vis
            artifact: vis-linux-x64
          # macos-15-xlarge is the arm64 (Apple silicon) larger runner with
          # 14 GB RAM. The default macos-latest (M1, 7 GB) cannot host the
          # native-image builder — GraalPy forces -Xms14g, so 7 GB swaps into a
          # DeadlockWatchdog kill (exit 30). 14 GB clears that.
          - os: macos-15-xlarge
            bin: target/vis
            artifact: vis-macos-arm64
          - os: windows-latest
            bin: target/vis.exe
            artifact: vis-windows-x64
    steps:
      - uses: actions/checkout@v4
      # GraalVM COMMUNITY Edition (GPLv2 + Classpath Exception) — the SAME pinned
      # graalvm-ce-builds asset CI installs. Keeps Oracle GraalVM (GFTC) OUT of
      # the distributed binary, so the redistribution/license story stays FOSS.
      # Bump the version inside the action together with deps.edn's org.graalvm.*
      # pins — Truffle/SVM refuse mismatches.
      - uses: ./.github/actions/setup-graalvm-25
      # native-image links through the platform C toolchain; on Windows that's
      # MSVC, which graalvm/setup-graalvm used to configure for us. The CE
      # composite doesn't, so set the MSVC dev environment up explicitly.
      - if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure/.cpcache
          key: deps-${{ runner.os }}-${{ hashFiles('deps.edn', 'extensions/**/deps.edn') }}
          restore-keys: deps-${{ runner.os }}-
      - name: Build native image
        run: clojure -T:build native
      - name: Smoke-test the binary (--version, help)
        shell: bash
        run: |
          "${{ matrix.bin }}" --version
          "${{ matrix.bin }}" help
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.bin }}
          if-no-files-found: error
