name: Native Image

# Gated on CI: native-image only builds AFTER the CI workflow (tests on every
# OS + per-extension classpath + the AOT uberjar compile) succeeds for a commit,
# so tests pass and every namespace compiles BEFORE the heavy, slow
# native-image build runs. A red CI never reaches native-image.
# Manual runs (workflow_dispatch) bypass the gate.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: native-${{ github.event.workflow_run.head_sha || github.ref }}
  cancel-in-progress: true

jobs:
  # Build the standalone `vis` native binary on each OS, smoke-test it, and
  # upload it as an artifact. native-image of a GraalPy-embedding Clojure app is
  # heavy (RAM + minutes); fail-fast false so one OS failing still reports the rest.
  native:
    name: native / ${{ matrix.os }}
    # Build only when the gating CI run passed (or a manual dispatch).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bin: target/vis
            artifact: vis-linux-x64
          - os: macos-latest
            bin: target/vis
            artifact: vis-macos-arm64
          - os: windows-latest
            bin: target/vis.exe
            artifact: vis-windows-x64
    steps:
      # Build the exact commit CI validated (workflow_run checks out the default
      # branch by default, not the triggering SHA).
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
      # GraalVM COMMUNITY Edition (GPLv2 + Classpath Exception) — the SAME pinned
      # graalvm-ce-builds asset CI installs. Keeps Oracle GraalVM (GFTC) OUT of
      # the distributed binary, so the redistribution/license story stays FOSS.
      # Bump the version inside the action together with deps.edn's org.graalvm.*
      # pins — Truffle/SVM refuse mismatches.
      - uses: ./.github/actions/setup-graalvm-25
      # native-image links through the platform C toolchain; on Windows that's
      # MSVC, which graalvm/setup-graalvm used to configure for us. The CE
      # composite doesn't, so set the MSVC dev environment up explicitly.
      - if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure/.cpcache
          key: deps-${{ runner.os }}-${{ hashFiles('deps.edn', 'extensions/**/deps.edn') }}
          restore-keys: deps-${{ runner.os }}-
      - name: Build native image
        run: clojure -T:build native
      - name: Smoke-test the binary (--version, help)
        shell: bash
        run: |
          "${{ matrix.bin }}" --version
          "${{ matrix.bin }}" help
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.bin }}
          if-no-files-found: error
