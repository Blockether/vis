name: Native Image

# Runs ONLY on release: when a GitHub Release is published (and via manual
# dispatch for ad-hoc builds). native-image of a GraalPy-embedding Clojure app
# is heavy (RAM + minutes) and the paid runners bill hard, so we build the
# shippable binaries at release time rather than on every commit.
# fail-fast false so one OS failing still reports the rest.
on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: native-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build the standalone `vis` native binary on each OS, smoke-test it, and
  # upload it as an artifact. native-image of a GraalPy-embedding Clojure app is
  # heavy (RAM + minutes); fail-fast false so one OS failing still reports the rest.
  native:
    name: native / ${{ matrix.os }}
    # (release-only — builds the shippable binaries when a Release is published.)
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bin: target/vis
            artifact: vis-linux-x64
          # macOS is built for BOTH arches so Apple-silicon users get a native
          # arm64 binary and Intel users an x64 one. Both need 14 GB because GraalPy
          # forces -Xms14g; the default macos-latest (M1, 7 GB) swaps into a
          # DeadlockWatchdog kill (exit 30), so 7 GB runners are unusable here.
          #
          # arm64: macos-15-xlarge (M2 Pro, 14 GB) is the smallest Apple-silicon
          # runner that clears the 14 GB floor. Larger runners need a Team/Enterprise
          # plan and bill at ~$0.16/min.
          - os: macos-15-xlarge
            bin: target/vis
            artifact: vis-macos-arm64
          # x64: macos-15-large (Intel, 12-core, 14 GB) is the standard-tier 14 GB
          # runner at ~half the xlarge rate — no Team/Enterprise gating.
          - os: macos-15-large
            bin: target/vis
            artifact: vis-macos-x64
    steps:
      - uses: actions/checkout@v6
      # GraalVM COMMUNITY Edition (GPLv2 + Classpath Exception) — the SAME pinned
      # graalvm-ce-builds asset CI installs. Keeps Oracle GraalVM (GFTC) OUT of
      # the distributed binary, so the redistribution/license story stays FOSS.
      # Bump the version inside the action together with deps.edn's org.graalvm.*
      # pins — Truffle/SVM refuse mismatches.
      - uses: ./.github/actions/setup-graalvm-25
      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest
      - uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure/.cpcache
          key: deps-${{ runner.os }}-${{ hashFiles('deps.edn', 'extensions/**/deps.edn') }}
          restore-keys: deps-${{ runner.os }}-
      - name: Build native image
        run: clojure -T:build native
      - name: Smoke-test the binary (--version, help)
        shell: bash
        run: |
          "${{ matrix.bin }}" --version
          "${{ matrix.bin }}" help
      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.bin }}
          if-no-files-found: error
