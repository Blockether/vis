name: Audit doc (audit/README.md)

# Keeps audit/README.md — the dependency / license / footprint inventory — generated
# straight from the deps.edn graph, so it can never drift from the code.
#
# scripts/gen-audit.bb walks every deps.edn, resolves each artifact's license
# (following parent POMs) and jar size from Clojars / Maven Central, and renders
# the whole document.
#
#   Fail-only mode: this workflow NEVER commits to the repo. On every trigger it
#   regenerates audit/README.md and FAILS if the committed copy drifted, so a
#   human regenerates it and commits it in their own PR. No bot ever writes to
#   main (satisfies a "no bot commits on protected branch" org policy).

on:
  push:
    branches: [main]
    paths:
      - '**/deps.edn'
      - 'scripts/gen-audit.bb'
      - '.github/workflows/audit-md.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/deps.edn'
      - 'scripts/gen-audit.bb'
      - '.github/workflows/audit-md.yml'
  # Licenses/sizes rarely change, but a released version can be re-published —
  # refresh weekly so the doc stays honest even with no repo change.
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:

concurrency:
  group: audit-md-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # fail-only: never writes back, just checks freshness

jobs:
  audit-md:
    name: regenerate AUDIT.md
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          bb: latest # babashka runs scripts/gen-audit.bb

      - name: Regenerate audit/README.md
        run: bb scripts/gen-audit.bb

      # Fail-only: never push. If the committed doc drifted from what the
      # generator produces, fail and point the author at the one fix command.
      - name: Fail if audit/README.md drifted
        run: |
          if ! git diff --quiet -- audit/README.md; then
            echo '::error::audit/README.md is out of date. Run `bb scripts/gen-audit.bb` and commit the result.'
            git --no-pager diff -- audit/README.md
            exit 1
          fi
          echo 'audit/README.md is up to date.'
