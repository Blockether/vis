name: Android companion

# Builds the Vis Companion Android app (apps/vis-companion) and, when Firebase
# secrets are present, distributes the APK to testers via Firebase App
# Distribution — the Android analogue of TestFlight (which is iOS-only).
#
# The android/ project is gitignored and scaffolded on demand with
# `cap add android`, so every run regenerates it from the web build.

on:
  workflow_dispatch:
    inputs:
      distribute:
        description: "Distribute the APK to Firebase App Distribution testers"
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - "apps/vis-companion/**"
      - ".github/workflows/android-companion.yml"

concurrency:
  group: android-companion-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/vis-companion
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/vis-companion/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build

      - name: Generate Capacitor config
        run: npm run cap:config

      - name: Scaffold and sync Android project
        run: |
          npx cap add android
          npx cap sync android

      - name: Assemble debug APK
        working-directory: apps/vis-companion/android
        run: ./gradlew --no-daemon assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vis-companion-debug-apk
          path: apps/vis-companion/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Distribute to Firebase App Distribution
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.distribute }}
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: apps/vis-companion/android/app/build/outputs/apk/debug/app-debug.apk
