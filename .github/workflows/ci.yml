name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Full test suite on every OS. vis embeds GraalPy (Truffle) + rift FFM, so
  # tests run on Oracle GraalVM 25 (the runtime the app targets). fail-fast
  # false so each OS reports independently — Windows GraalPy/FFM is the riskiest.
  tests:
    name: tests / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'false'
      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure/.cpcache
          key: deps-${{ runner.os }}-${{ hashFiles('deps.edn', 'extensions/**/deps.edn') }}
          restore-keys: deps-${{ runner.os }}-
      - name: Run test suite
        run: clojure -M:test

  # Every extension must resolve its own deps.edn cleanly — catches stale
  # :local/root paths or missing siblings the aggregate run would mask.
  classpath:
    name: classpath / ${{ matrix.path }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        path:
          - .
          - extensions/persistance/vis-persistance-sqlite
          - extensions/providers/vis-provider-github-copilot
          - extensions/providers/vis-provider-openai-codex
          - extensions/providers/vis-provider-anthropic
          - extensions/providers/vis-provider-zai
          - extensions/providers/vis-provider-standard
          - extensions/channels/vis-channel-telegram
          - extensions/channels/vis-channel-tui
          - extensions/channels/vis-channel-web
          - extensions/common/vis-foundation-bridge
          - extensions/common/vis-foundation-shell
          - extensions/common/vis-foundation-harness
          - extensions/common/vis-foundation-search
          - extensions/common/vis-foundation-git
          - extensions/common/vis-foundation-voice
          - extensions/common/vis-foundation-mcp
          - extensions/languages/vis-language-clojure
          - extensions/workspaces/vis-workspace-rift
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest
      - name: Resolve ${{ matrix.path }} classpath
        run: cd ${{ matrix.path }} && clojure -Spath > /dev/null

  # The umbrella jar must build (the release workflow uses the same task).
  build-jar:
    name: build / umbrella jar
    runs-on: ubuntu-latest
    needs: [tests, classpath]
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest
      - name: Build umbrella jar
        run: clojure -T:build jar
