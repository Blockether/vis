name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Full test suite on Linux + macOS only. vis embeds GraalPy (Truffle) + rift
  # FFM, so tests run on Oracle GraalVM 25 (the runtime the app targets).
  # fail-fast false so each OS reports independently. Windows is not supported.
  tests:
    name: tests / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      # Oracle GraalVM's 25.1 feature train is GDS-token gated (not on the free
      # download channel) and setup-graalvm's CE resolver predates the 25.1
      # innovation naming, so we install the pinned graalvm-ce-builds asset
      # directly. Bump the version inside the action with deps.edn's
      # org.graalvm.* pins — Truffle/SVM refuse mismatches.
      - uses: ./.github/actions/setup-graalvm-25
      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest
      - uses: actions/cache@v6
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure/.cpcache
          key: deps-${{ runner.os }}-${{ hashFiles('deps.edn', 'extensions/**/deps.edn') }}
          restore-keys: deps-${{ runner.os }}-
      # Several unit tests resolve the provider router, which reads
      # `~/.vis/config.edn` (the dev machine always has one). Seed a minimal
      # provider so `resolve-config` doesn't throw "No AI provider is
      # configured yet." — replicating the local green state. No network: the
      # tests that touch a provider mock the transport.
      - name: Seed a minimal AI provider config + harness fixtures
        shell: bash
        run: |
          mkdir -p "$HOME/.vis"
          cat > "$HOME/.vis/config.edn" <<'EDN'
          {:providers [{:id :anthropic-coding-plan
                        :models [{:name "claude-opus-4-8"}]
                        :base-url "https://api.anthropic.com/v1"
                        :api-key "ci-dummy-key"}]}
          EDN
          # Harness discovery scans ~/.claude/{agents,skills}; the dev machine
          # always has some. Seed the fixtures the harness tests expect.
          mkdir -p "$HOME/.claude/agents" "$HOME/.claude/skills/ci-skill"
          cat > "$HOME/.claude/agents/code-reviewer.md" <<'MD'
          ---
          name: code-reviewer
          description: CI fixture agent.
          model: sonnet
          ---
          You are a code reviewer.
          MD
          cat > "$HOME/.claude/skills/ci-skill/SKILL.md" <<'MD'
          ---
          name: ci-skill
          description: CI fixture skill.
          ---
          Do the thing.
          MD
      - name: Run test suite
        run: clojure -M:test

  # Every extension must resolve its own deps.edn cleanly — catches stale
  # :local/root paths or missing siblings the aggregate run would mask.
  classpath:
    name: classpath / ${{ matrix.path }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        path:
          - .
          - extensions/persistance/vis-persistance-sqlite
          - extensions/providers/vis-provider-github-copilot
          - extensions/providers/vis-provider-openai-codex
          - extensions/providers/vis-provider-anthropic
          - extensions/providers/vis-provider-zai
          - extensions/providers/vis-provider-standard
          - extensions/channels/vis-channel-tui
          - extensions/common/vis-foundation-bridge
          - extensions/common/vis-foundation-harness
          - extensions/common/vis-foundation-search
          - extensions/common/vis-foundation-voice
          - extensions/common/vis-foundation-mcp
          - extensions/languages/vis-language-clojure
          - extensions/workspaces/vis-workspace-rift
    steps:
      - uses: actions/checkout@v7
      # See the tests job for why we install GraalVM CE 25.1.3 directly rather
      # than via graalvm/setup-graalvm.
      - uses: ./.github/actions/setup-graalvm-25
      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest
      - uses: actions/cache@v6
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure/.cpcache
          key: deps-${{ runner.os }}-${{ hashFiles('deps.edn', 'extensions/**/deps.edn') }}
          restore-keys: deps-${{ runner.os }}-
      - name: Resolve ${{ matrix.path }} classpath
        run: cd ${{ matrix.path }} && clojure -Spath > /dev/null

  # AOT gate: compile EVERY namespace (core + every extension) exactly as the
  # native build's prepare-native-classes! does. This is what catches compile
  # errors (e.g. an unresolved symbol in an extension) BEFORE the slow, gated
  # native-image build ever starts — `clojure -M:test` alone does not compile
  # namespaces no test loads. Native Image runs only after this is green.
  aot:
    name: build / aot uberjar
    runs-on: ubuntu-latest
    needs: [tests, classpath]
    steps:
      - uses: actions/checkout@v7
      # See the tests job for why we install GraalVM CE 25.1.3 directly rather
      # than via graalvm/setup-graalvm.
      - uses: ./.github/actions/setup-graalvm-25
      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest
      - uses: actions/cache@v6
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure/.cpcache
          key: deps-${{ runner.os }}-${{ hashFiles('deps.edn', 'extensions/**/deps.edn') }}
          restore-keys: deps-${{ runner.os }}-
      - name: AOT-compile all namespaces (uberjar)
        run: clojure -T:build uber
