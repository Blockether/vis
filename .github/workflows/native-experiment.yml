name: Native Experiment

# TEMPORARY: probe which FREE macOS runners can build the GraalPy-embedding
# native image, since the paid larger runners are blocked by the org spending
# limit. Free runners never bill, so we can iterate here for free. Delete once
# native.yml / native-release.yml are updated with the winning config.
#
# STATUS (from run 29472962818):
#   • linux-x64 (ubuntu-latest, 16 GB) — GREEN in ~26 min. Confirms the
#     -Os + interpreter-only build change ships green on Linux. Not re-probed.
#   • macos-13 (Intel, 14 GB) — DEAD END: GraalVM CE 25.1.x publishes NO
#     macos-x64 asset (only macos-aarch64), and free Intel runners queue
#     indefinitely here anyway. Dropped.
#   • macos-14 / macos-15 (Apple silicon, 7 GB) — the ONLY free arm option.
#     GraalPy forces -Xms14g; we override it down to fit and let macOS swap.
#     The build makes forward progress (never DeadlockWatchdog-killed) but the
#     swap crawl runs LONGER than the old 90-min cap — hence timeout 240.
on:
  workflow_dispatch:
  push:
    branches: [ci/native-free-runners]

concurrency:
  group: native-experiment-${{ github.ref }}
  cancel-in-progress: true

jobs:
  probe:
    name: probe / ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          # Free Apple-silicon runners, 7 GB — override GraalPy's -Xms14g down to
          # fit, cap -Xmx below the 7 GB ceiling, ParallelGC for throughput on the
          # swap-heavy build. macos-15 is what the real workflows will target
          # (== macos-latest); macos-14 is a hedge on identical M1 hardware.
          - { label: macos15-arm-7g, os: macos-15, extra: "-J-Xmx6g -J-Xms1g -J-XX:+UseParallelGC" }
          - { label: macos14-arm-7g, os: macos-14, extra: "-J-Xmx6g -J-Xms1g -J-XX:+UseParallelGC" }
    steps:
      - uses: actions/checkout@v6
      - name: Report runner specs
        shell: bash
        run: |
          sw_vers || true
          echo "arch: $(uname -m)"
          echo "mem bytes: $(sysctl -n hw.memsize 2>/dev/null || true)"
          echo "cpus: $(sysctl -n hw.ncpu 2>/dev/null || true)"
      - uses: ./.github/actions/setup-graalvm-25
      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest
      - uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure/.cpcache
            ~/.vis/build-cache
          key: deps-${{ runner.os }}-${{ hashFiles('deps.edn', 'extensions/**/deps.edn') }}
          restore-keys: deps-${{ runner.os }}-
      - name: Build native image (:voice)
        env:
          VIS_NATIVE_EXTRA_ARGS: ${{ matrix.extra }}
        run: clojure -T:build native :profile :voice
      - name: Smoke-test the binary
        shell: bash
        run: |
          ./target/vis --version
          ./target/vis help >/dev/null
      - uses: actions/upload-artifact@v5
        with:
          name: vis-${{ matrix.label }}
          path: target/vis
          if-no-files-found: error
