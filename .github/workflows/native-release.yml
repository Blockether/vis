name: Native Release

# Companion to release.yml (which cuts the GitHub Release + Clojars deploy of the
# libraries/extensions). On each `v*` tag this builds TWO native distributions
# per OS:
#   vis-<os>-community  — the FULL agent: every channel (TUI + web + Telegram),
#                         voice ASR, AND the web/network `search` extension. The
#                         ~465 MB Parakeet voice model is NOT embedded — it
#                         downloads on first use, so the binary stays lean.
#   vis-<os>-corporate  — the AIR-GAPPED agent: the `search` extension is dropped
#                         entirely and the Parakeet ASR model is EMBEDDED, so the
#                         binary never fetches anything from HuggingFace/network.
# Each binary carries ONLY its own build host's native libs, never another
# platform's.
#
# The native binary is the ONLY distributed application artifact — there is no
# JVM uberjar release asset. Libraries/extensions still publish to Clojars from
# release.yml for people writing extensions. Tags only; never feature branches.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write          # upload assets to the release

concurrency:
  group: native-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  native:
    name: native / ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, profile: community, bin: target/vis, asset: vis-linux-x64-community, extra_args: '' }
          - { os: ubuntu-latest, profile: corporate, bin: target/vis, asset: vis-linux-x64-corporate, extra_args: '' }
          # macos-15: FREE Apple-silicon runner (M1, 7 GB). The paid macos-15-xlarge
          # (14 GB) is blocked by the org spending limit, so free runners are the only
          # option. GraalPy forces -Xms14g, which on a 7 GB host swaps into a
          # DeadlockWatchdog kill — so VIS_NATIVE_EXTRA_ARGS overrides the heap
          # (-Xmx6g/-Xms1g), and the -Os + interpreter-only build (DefaultTruffleRuntime,
          # no Truffle JIT) keeps the analysis footprint low enough to fit via swap.
          - { os: macos-15, profile: community, bin: target/vis, asset: vis-macos-arm64-community, extra_args: '-J-Xmx6g -J-Xms1g -J-XX:+UseParallelGC' }
          - { os: macos-15, profile: corporate, bin: target/vis, asset: vis-macos-arm64-corporate, extra_args: '-J-Xmx6g -J-Xms1g -J-XX:+UseParallelGC' }
    steps:
      - uses: actions/checkout@v7
      # GraalVM COMMUNITY Edition (GPLv2 + Classpath Exception) — the SAME pinned
      # graalvm-ce-builds asset CI installs. Keeps Oracle GraalVM (GFTC) OUT of
      # the distributed binary, so the redistribution/license story stays FOSS.
      # Bump the version inside the action together with deps.edn's org.graalvm.*
      # pins — Truffle/SVM refuse mismatches.
      - uses: ./.github/actions/setup-graalvm-25
      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest
      - uses: actions/cache@v6
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure/.cpcache
            ~/.vis/build-cache
          key: deps-${{ runner.os }}-${{ hashFiles('deps.edn', 'extensions/**/deps.edn') }}
          restore-keys: deps-${{ runner.os }}-
      # community: full agent, model downloads on first use (lean binary).
      # corporate: `search` dropped + Parakeet model embedded by the profile
      # itself (no :with-assets flag needed), so the binary is fully offline.
      - name: Build native image
        env:
          VIS_NATIVE_EXTRA_ARGS: ${{ matrix.extra_args }}
        run: clojure -T:build native :profile :${{ matrix.profile }}
      - name: Stage asset
        shell: bash
        run: cp "${{ matrix.bin }}" "${{ matrix.asset }}"
      - name: Smoke-test the binary
        shell: bash
        run: ./"${{ matrix.bin }}" help >/dev/null
      # Deeper smoke: boot the gateway. A client command auto-spawns the DETACHED
      # gateway daemon, which builds the FULL reitit router from EVERY channel's
      # route contributions and does a real HTTP round-trip. A broken/conflicting
      # route table makes the daemon exit on startup and the client prints
      # "gateway daemon did not become ready" — a class of failure `help`
      # (in-process, no router) can never catch. Fail HERE rather than ship a
      # binary whose gateway (and thus every agent turn) can't run.
      - name: Smoke-test the gateway
        shell: bash
        run: |
          set -uo pipefail
          out="$(./"${{ matrix.bin }}" providers status anthropic 2>&1 || true)"
          echo "$out"
          if printf '%s\n' "$out" | grep -q 'did not become ready'; then
            echo '::error::gateway daemon failed to boot — the route table is broken'
            exit 1
          fi
          ./"${{ matrix.bin }}" gateway stop >/dev/null 2>&1 || true
      - name: Attach to release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.asset }}
          fail_on_unmatched_files: true
