name: Native Release

# Companion to release.yml (which cuts the GitHub Release + Clojars deploy).
# On each `v*` tag this builds, per OS, BOTH native distributions — lean (the
# voice model downloads on first use) and `-with-assets` (the ~465 MB model
# embedded for fully-offline voice) — plus the portable JVM uberjar, and
# attaches them to that tag's release. Tags only; never feature branches.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write          # upload assets to the release

concurrency:
  group: native-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  native:
    name: native / ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120     # the -with-assets variant also downloads ~465 MB
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  bin: target/vis,     asset: vis-linux-x64,                   args: "" }
          - { os: ubuntu-latest,  bin: target/vis,     asset: vis-linux-x64-with-assets,       args: ":with-assets true" }
          - { os: macos-latest,   bin: target/vis,     asset: vis-macos-arm64,                 args: "" }
          - { os: macos-latest,   bin: target/vis,     asset: vis-macos-arm64-with-assets,     args: ":with-assets true" }
          - { os: windows-latest, bin: target/vis.exe, asset: vis-windows-x64.exe,             args: "" }
          - { os: windows-latest, bin: target/vis.exe, asset: vis-windows-x64-with-assets.exe, args: ":with-assets true" }
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'
      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure/.cpcache
            ~/.vis/build-cache
          key: deps-${{ runner.os }}-${{ hashFiles('deps.edn', 'extensions/**/deps.edn') }}
          restore-keys: deps-${{ runner.os }}-
      - name: Build native image
        run: clojure -T:build native ${{ matrix.args }}
      - name: Stage asset
        shell: bash
        run: cp "${{ matrix.bin }}" "${{ matrix.asset }}"
      - name: Smoke-test the binary
        shell: bash
        run: ./"${{ matrix.bin }}" help >/dev/null
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          fail_on_unmatched_files: true

  jar:
    name: jvm uberjar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest
      - name: Build uberjar
        run: clojure -T:build uber
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: target/vis.jar
          fail_on_unmatched_files: true
