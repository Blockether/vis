name: Native Release

# Companion to release.yml (which cuts the GitHub Release + Clojars deploy).
# On each `v*` tag this builds, per OS, THREE native distributions:
#   vis-<os>-tui    — minimal: TUI channel only, no web/Telegram, no voice
#   vis-<os>        — cross: all channels, no voice
#   vis-<os>-voice  — cross + voice ASR with the ~465 MB Parakeet model
#                     EMBEDDED in the binary: fully offline voice, no
#                     first-use download (~1.1 GB asset)
# Every variant carries ONLY the build host's native libs, never another
# platform's. Plus the portable JVM uberjar (full/voice profile — the one
# deliberately cross-platform artifact), attached to that tag's release.
# Tags only; never feature branches.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write          # upload assets to the release

concurrency:
  group: native-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  native:
    name: native / ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120     # the -with-assets variant also downloads ~465 MB
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  bin: target/vis,     asset: vis-linux-x64-tui,       args: ":profile :tui" }
          - { os: ubuntu-latest,  bin: target/vis,     asset: vis-linux-x64,           args: ":profile :cross" }
          - { os: ubuntu-latest,  bin: target/vis,     asset: vis-linux-x64-voice,     args: ":profile :voice :with-assets true" }
          - { os: macos-latest,   bin: target/vis,     asset: vis-macos-arm64-tui,     args: ":profile :tui" }
          - { os: macos-latest,   bin: target/vis,     asset: vis-macos-arm64,         args: ":profile :cross" }
          - { os: macos-latest,   bin: target/vis,     asset: vis-macos-arm64-voice,   args: ":profile :voice :with-assets true" }
          - { os: windows-latest, bin: target/vis.exe, asset: vis-windows-x64-tui.exe, args: ":profile :tui" }
          - { os: windows-latest, bin: target/vis.exe, asset: vis-windows-x64.exe,     args: ":profile :cross" }
          - { os: windows-latest, bin: target/vis.exe, asset: vis-windows-x64-voice.exe, args: ":profile :voice :with-assets true" }
    steps:
      - uses: actions/checkout@v4
      # GraalVM COMMUNITY Edition (GPLv2 + Classpath Exception) — the SAME pinned
      # graalvm-ce-builds asset CI installs. Keeps Oracle GraalVM (GFTC) OUT of
      # the distributed binary, so the redistribution/license story stays FOSS.
      # Bump the version inside the action together with deps.edn's org.graalvm.*
      # pins — Truffle/SVM refuse mismatches.
      - uses: ./.github/actions/setup-graalvm-25
      # native-image links through the platform C toolchain; on Windows that's
      # MSVC, which graalvm/setup-graalvm used to configure for us. The CE
      # composite doesn't, so set the MSVC dev environment up explicitly.
      - if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure/.cpcache
            ~/.vis/build-cache
          key: deps-${{ runner.os }}-${{ hashFiles('deps.edn', 'extensions/**/deps.edn') }}
          restore-keys: deps-${{ runner.os }}-
      - name: Build native image
        run: clojure -T:build native ${{ matrix.args }}
      - name: Stage asset
        shell: bash
        run: cp "${{ matrix.bin }}" "${{ matrix.asset }}"
      - name: Smoke-test the binary
        shell: bash
        run: ./"${{ matrix.bin }}" help >/dev/null
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          fail_on_unmatched_files: true

  # Portable JVM uberjar — the artifact `vis update <version>` falls back to and
  # the JVM distribution for platforms/users without a native binary.
  jar:
    name: jvm uberjar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # GraalVM COMMUNITY Edition (GPLv2 + Classpath Exception) — same pinned
      # graalvm-ce-builds asset CI installs. This job only builds the JVM uberjar
      # (no native linker / MSVC needed). Bump the version inside the action
      # together with deps.edn's org.graalvm.* pins — Truffle/SVM refuse mismatches.
      - uses: ./.github/actions/setup-graalvm-25
      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest
      - name: Build uberjar
        run: clojure -T:build uber
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: target/vis.jar
          fail_on_unmatched_files: true
