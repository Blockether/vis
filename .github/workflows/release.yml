name: Release & Deploy to Clojars

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    name: Release & Deploy to Clojars

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch tags and changelog history
        run: |
          git fetch --tags --no-recurse-submodules origin
          git fetch --deepen=200 origin main

      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest

      - name: Cache Clojure deps
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure/.cpcache
          key: deps-${{ runner.os }}-${{ hashFiles('deps.edn', 'extensions/**/deps.edn') }}
          restore-keys: |
            deps-${{ runner.os }}-

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          PREV_TAG=$(git tag --sort=-v:refname | head -n 2 | tail -n 1)
          CURRENT_TAG=${{ github.ref_name }}
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$CURRENT_TAG" ]; then
            RANGE="$CURRENT_TAG"
          else
            RANGE="${PREV_TAG}..${CURRENT_TAG}"
          fi

          CHANGELOG=$(git log --pretty=format:"- %s (%h)" $RANGE)

          package_changes() {
            local any=false
            echo "### Package changes"
            echo ""

            local root_entries
            root_entries=$(git log --pretty=format:"- %s (%h)" $RANGE -- . ':(exclude)extensions' || true)
            if [ -n "$root_entries" ]; then
              any=true
              echo "#### com.blockether/vis"
              echo "$root_entries"
              echo ""
            fi

            while IFS= read -r deps_file; do
              local dir short lib entries
              dir="${deps_file%/deps.edn}"
              short=$(basename "$dir")
              lib="com.blockether/$short"
              entries=$(git log --pretty=format:"- %s (%h)" $RANGE -- "$dir" || true)
              if [ -n "$entries" ]; then
                any=true
                echo "#### $lib"
                echo "$entries"
                echo ""
              fi
            done < <(find extensions -mindepth 2 -maxdepth 3 -name deps.edn -print | sort)

            if [ "$any" = false ]; then
              echo "- No package-scoped changes."
              echo ""
            fi
          }

          package_changes > /tmp/package_changes.md

          {
            echo "## What's Changed"
            echo ""
            echo "$CHANGELOG"
            echo ""
            cat /tmp/package_changes.md
            echo "**Full Changelog**: https://github.com/Blockether/vis/compare/${PREV_TAG}...${CURRENT_TAG}"
          } > /tmp/release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: /tmp/release_body.md

      - name: Check if version exists on Clojars
        id: check-clojars
        shell: bash
        run: |
          set -euo pipefail
          # The monorepo publishes com.blockether/vis plus every package discovered
          # from extensions/**/deps.edn. Probe the root vis jar as the bellwether —
          # every release deploys the full selected package set together.
          VERSION="${GITHUB_REF_NAME#v}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://repo.clojars.org/com/blockether/vis/$VERSION/vis-$VERSION.jar")
          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Version $VERSION already exists on Clojars - skipping deploy"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & Deploy monorepo packages to Clojars
        if: steps.check-clojars.outputs.exists != 'true'
        env:
          VERSION: ${{ github.ref_name }}
          CLOJARS_USERNAME: blockether-deployer
          CLOJARS_PASSWORD: ${{ secrets.CLOJARS_DEPLOY_TOKEN }}
        run: clojure -T:build deploy

      - name: Update README.md version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/{:mvn\/version \"[^\"]*\"}/{:mvn\/version \"$VERSION\"}/g" README.md

      - name: Update CHANGELOG.md
        shell: bash
        run: |
          set -euo pipefail
          PREV_TAG=$(git tag --sort=-v:refname | head -n 2 | tail -n 1)
          CURRENT_TAG=${{ github.ref_name }}
          DATE=$(date +%Y-%m-%d)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$CURRENT_TAG" ]; then
            RANGE="$CURRENT_TAG"
          else
            RANGE="${PREV_TAG}..${CURRENT_TAG}"
          fi
          COMMITS=$(git log --pretty=format:"- %s" $RANGE)
          if [ ! -f /tmp/package_changes.md ]; then
            echo "### Package changes" > /tmp/package_changes.md
            echo "" >> /tmp/package_changes.md
            echo "- Package change details were unavailable for this release run." >> /tmp/package_changes.md
          fi
          UNRELEASED_LINE=$(grep -n '^## \[Unreleased\]' CHANGELOG.md | head -1 | cut -d: -f1)
          if [ -z "$UNRELEASED_LINE" ]; then
            echo "ERROR: Could not find ## [Unreleased] section in CHANGELOG.md"
            exit 1
          fi
          {
            head -n "$UNRELEASED_LINE" CHANGELOG.md
            echo ""
            echo "## [$CURRENT_TAG] - $DATE"
            echo ""
            echo "### Changed"
            echo "$COMMITS"
            echo ""
            cat /tmp/package_changes.md
            echo ""
            tail -n +$((UNRELEASED_LINE + 1)) CHANGELOG.md
          } > CHANGELOG.md.tmp && mv CHANGELOG.md.tmp CHANGELOG.md
          sed -i "s|\[Unreleased\]: .*|[Unreleased]: https://github.com/Blockether/vis/compare/${CURRENT_TAG}...HEAD|" CHANGELOG.md
          if ! grep -q "^\[${CURRENT_TAG}\]:" CHANGELOG.md; then
            echo "[$CURRENT_TAG]: https://github.com/Blockether/vis/releases/tag/${CURRENT_TAG}" >> CHANGELOG.md
          fi

      - name: Bump VERSION to next patch
        run: |
          # VERSION moved from `resources/VERSION` to the repo root in the
          # monorepo split. build.clj reads the root file and embeds it as
          # `META-INF/vis/VERSION` inside the jar.
          CURRENT="${GITHUB_REF_NAME#v}"
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEXT_PATCH=$((PATCH + 1))
          NEXT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}"
          echo "$NEXT_VERSION" > VERSION
          echo "Bumped VERSION to $NEXT_VERSION"

      - name: Commit version updates
        run: |
          git config user.name "blockether-deployer"
          git config user.email "contact@blockether.com"
          git add README.md CHANGELOG.md VERSION
          git diff --cached --quiet && echo "No changes to commit" || {
            git commit -m "release: update version files for ${{ github.ref_name }}, bump to next dev version"
            git push origin main
          }
