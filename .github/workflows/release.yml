name: Release & Deploy to Clojars

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    name: Release & Deploy to Clojars

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch tags and changelog history
        run: |
          git fetch --tags --no-recurse-submodules origin
          git fetch --deepen=200 origin main

      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest

      - name: Cache Clojure deps
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure/.cpcache
          key: deps-${{ runner.os }}-${{ hashFiles('deps.edn') }}
          restore-keys: |
            deps-${{ runner.os }}-

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -n 2 | tail -n 1)
          CURRENT_TAG=${{ github.ref_name }}
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$CURRENT_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" $CURRENT_TAG)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..${CURRENT_TAG})
          fi
          {
            echo "## What's Changed"
            echo ""
            echo "$CHANGELOG"
            echo ""
            echo "**Full Changelog**: https://github.com/Blockether/vis/compare/${PREV_TAG}...${CURRENT_TAG}"
          } > /tmp/release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: /tmp/release_body.md

      - name: Check if version exists on Clojars
        id: check-clojars
        run: |
          # The monorepo publishes 9 artifacts - vis-loop, vis-commandline,
          # vis-extension, vis-logging, vis-persistance, vis-persistance-sqlite,
          # vis-provider, vis-channel-telegram, vis-channel-tui. Probe vis-loop as the
          # bellwether - every release deploys the whole set together so
          # vis-loop's presence implies the rest landed too.
          VERSION="${GITHUB_REF_NAME#v}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://repo.clojars.org/com/blockether/vis-loop/$VERSION/vis-loop-$VERSION.jar")
          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Version $VERSION already exists on Clojars - skipping deploy"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & Deploy all 9 packages to Clojars
        if: steps.check-clojars.outputs.exists != 'true'
        env:
          VERSION: ${{ github.ref_name }}
          CLOJARS_USERNAME: blockether-deployer
          CLOJARS_PASSWORD: ${{ secrets.CLOJARS_DEPLOY_TOKEN }}
        run: clojure -T:build deploy

      - name: Update README.md version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/{:mvn\/version \"[^\"]*\"}/{:mvn\/version \"$VERSION\"}/g" README.md

      - name: Update CHANGELOG.md
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -n 2 | tail -n 1)
          CURRENT_TAG=${{ github.ref_name }}
          DATE=$(date +%Y-%m-%d)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$CURRENT_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" $CURRENT_TAG)
          else
            COMMITS=$(git log --pretty=format:"- %s" ${PREV_TAG}..${CURRENT_TAG})
          fi
          UNRELEASED_LINE=$(grep -n '^## \[Unreleased\]' CHANGELOG.md | head -1 | cut -d: -f1)
          if [ -z "$UNRELEASED_LINE" ]; then
            echo "ERROR: Could not find ## [Unreleased] section in CHANGELOG.md"
            exit 1
          fi
          {
            head -n "$UNRELEASED_LINE" CHANGELOG.md
            echo ""
            echo "## [$CURRENT_TAG] - $DATE"
            echo ""
            echo "### Changed"
            echo "$COMMITS"
            echo ""
            tail -n +$((UNRELEASED_LINE + 1)) CHANGELOG.md
          } > CHANGELOG.md.tmp && mv CHANGELOG.md.tmp CHANGELOG.md
          sed -i "s|\[Unreleased\]: .*|[Unreleased]: https://github.com/Blockether/vis/compare/${CURRENT_TAG}...HEAD|" CHANGELOG.md
          if ! grep -q "^\[${CURRENT_TAG}\]:" CHANGELOG.md; then
            echo "[$CURRENT_TAG]: https://github.com/Blockether/vis/releases/tag/${CURRENT_TAG}" >> CHANGELOG.md
          fi

      - name: Bump VERSION to next patch
        run: |
          # VERSION moved from `resources/VERSION` to the repo root in the
          # monorepo split. build.clj reads the root file and embeds it as
          # `META-INF/vis/VERSION` inside the jar.
          CURRENT="${GITHUB_REF_NAME#v}"
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEXT_PATCH=$((PATCH + 1))
          NEXT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}"
          echo "$NEXT_VERSION" > VERSION
          echo "Bumped VERSION to $NEXT_VERSION"

      - name: Commit version updates
        run: |
          git config user.name "blockether-deployer"
          git config user.email "contact@blockether.com"
          git add README.md CHANGELOG.md VERSION
          git diff --cached --quiet && echo "No changes to commit" || {
            git commit -m "release: update version files for ${{ github.ref_name }}, bump to next dev version"
            git push origin main
          }
