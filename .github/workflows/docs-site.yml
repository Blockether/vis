name: Docs site

# Vis's docs are markdown under `resources/vis-docs/` (+ any extension that ships
# its own `vis-docs/`). `com.blockether.vis.internal.docs/build-site!` renders
# them to a themed static bundle (VIS palette). This workflow generates that
# bundle and publishes it to GitHub Pages. The SAME renderer also serves the
# docs live inside vis (gateway /docs route), so the site never diverges.

on:
  push:
    branches: [main]
    paths:
      - 'resources/vis-docs/**'
      - 'src/com/blockether/vis/internal/docs.clj'
      - '.github/workflows/docs-site.yml'
      - '**/resources/vis-docs/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Workflow-level concurrency: a newer push SUPERSEDES a still-building older
# run (saves CI minutes, avoids racing a stale commit onto the site). This is
# safe because it can only cancel the cheap, stateless `build` job — the
# `deploy` job carries its own non-cancelling group below.
concurrency:
  group: docs-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: latest

      - uses: actions/cache@v6
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure/.cpcache
          key: deps-${{ runner.os }}-${{ hashFiles('deps.edn', 'extensions/**/deps.edn') }}
          restore-keys: deps-${{ runner.os }}-

      # Self-contained: the docs namespace needs only commonmark + the
      # vis-docs resources on the classpath (no heavy app deps), so generation
      # is fast and deterministic.
      - name: Generate static docs site
        run: |
          clojure -Sdeps '{:paths ["src" "resources"]
            :deps {org.commonmark/commonmark {:mvn/version "0.24.0"}
                   org.commonmark/commonmark-ext-gfm-tables {:mvn/version "0.24.0"}
                   org.commonmark/commonmark-ext-gfm-strikethrough {:mvn/version "0.24.0"}}}' \
            -M -e "(require '[com.blockether.vis.internal.docs :as d]) (d/build-site! \"target/docs-site\")"
          test -f target/docs-site/index.html

      - uses: actions/upload-pages-artifact@v5
        with:
          path: target/docs-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # NEVER cancel an in-flight deploy. GitHub Pages processes deployments one
    # at a time on its backend; cancelling a queued/in-progress deployment
    # wedges that pipeline and every later run then sits in `deployment_queued`
    # forever. A separate group from the build lets a new push cancel a stale
    # build while any deploy already talking to the Pages backend runs to
    # completion. (Mirrors GitHub's official Pages starter workflow.)
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
