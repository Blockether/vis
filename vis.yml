# vis.yml — project sandbox config (snapshotted when an environment is created).

# Master escape hatch: disable the OS jail + egress proxy entirely. Set back to
# true (or remove) to re-enable containment. Temporarily off so an unjailed
# test-runner can execute the real Seatbelt E2E suite.
sandbox: false

jail:
  filesystem:
    # Sibling repositories available for full source/edit access. Each entry may be
    # a bare path or {path: .., description: ..}; the description lands in the
    # session's access view so the agent knows what each root is for.
    allow-read-write:
      - path: ~/spel
        description: Sibling repo — Clojure Playwright (spel) browser automation.
      - path: ~/tree-sitter-language-pack
        description: Sibling repo — tree-sitter grammars powering structural tools.
      - path: ~/svar
        description: Sibling repo — structured LLM output + routing library.
      # Vis' own state/config/log dir, so the agent can read ~/.vis/state.yml,
      # inspect logs, and diagnose config/provider issues in-session.
      - path: ~/.vis
        description: Vis' own state/config/log home — read state.yml, inspect logs, diagnose config.
    # Managed REPL / test-runner dependency caches. OPT-IN only: nothing writable
    # is granted by default anymore. Each entry is either a bare path (read+write)
    # or {path: .., access: read-only}. read-only lets a jailed JVM RESOLVE
    # already-cached artifacts without being able to modify the cache.
    language-caches:
      - ~/.m2
      # Includes ~/.clojure/deps.edn required by tools.deps startup.
      - ~/.clojure
      # Extracted tree-sitter native library loaded by structural tools/tests.
      - ~/.cache/clj-tslp
      # GraalVM installed by SDKMAN; the jailed JVM must read its runtime dylibs.
      - path: ~/.sdkman/candidates/java/25.1.3-graal
        access: read-only
      # Node/Vite/Capacitor cache for the apps/vis-companion universal build, so a
      # jailed `npm install` / `npm run build` resolves without a project-local
      # --cache workaround.
      - ~/.npm

  # Extra local ports on which a confined shell child may accept connections.
  # Empty / unset = no extra inbound ports (the secure default).
  inbound-ports:
    - 5273

# Outbound egress allowlist for the sandbox. A bare host also matches its
# subdomains, so `github.com` covers `api.github.com` and `githubusercontent.com`
# covers `raw.githubusercontent.com`. Empty/unset allowlist = any host (minus the
# SSRF deny-floor).
network:
  allowed-domains:
    - github.com
    - githubusercontent.com
    - exa.ai
